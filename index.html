<!DOCTYPE html>
<html lang="de">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="default">
<meta name="apple-mobile-web-app-title" content="Training">
<meta name="theme-color" content="#2563EB">
<link rel="manifest" href="manifest.json">
<link rel="apple-touch-icon" href="icon-192.png">
<link rel="stylesheet" href="css/style.css">
<title>Wochenplan</title>
</head>
<body>

<!-- Auth gate -->
<div class="auth-overlay" id="authOverlay">
  <div class="auth-card">
    <div class="auth-icon">🔒</div>
    <div class="auth-title">Training</div>
    <div class="auth-sub">PIN eingeben</div>
    <input class="auth-input" id="pinInput" type="password" inputmode="numeric" maxlength="8" placeholder="••••" autocomplete="current-password">
    <button class="auth-btn" onclick="checkPin()">Entsperren</button>
  </div>
</div>

<!-- Install banner -->
<div id="installBanner" style="display:none;background:#EFF6FF;border-radius:14px;padding:12px 16px;margin-bottom:16px;display:none;align-items:center;gap:10px;justify-content:space-between">
  <span style="font-size:13px;color:#1E40AF;font-weight:600">App installieren für Offline-Nutzung</span>
  <button onclick="installApp()" style="background:#2563EB;color:#fff;border:none;border-radius:8px;padding:6px 14px;font-size:13px;font-weight:700;cursor:pointer">Installieren</button>
</div>

<!-- Toolbar -->
<div class="toolbar">
  <div>
    <h1>Training</h1>
    <div class="subtitle">Wochenplan</div>
  </div>
  <div class="toolbar-actions">
    <button class="btn-icon" onclick="showHistory()" title="Verlauf">📅 Verlauf</button>
    <button class="btn-icon" onclick="exportData()" title="Exportieren">⬇︎</button>
    <button class="btn-icon" onclick="importData()" title="Importieren">⬆︎</button>
  </div>
</div>

<div class="days" id="tabs"></div>
<div class="card" id="card"></div>

<!-- History overlay -->
<div class="hist-overlay" id="historyOverlay" onclick="if(event.target===this)hideHistory()">
  <div class="hist-sheet">
    <div class="hist-head">
      <span class="hist-title">Trainingsverlauf</span>
      <button class="hist-close" onclick="hideHistory()">✕</button>
    </div>
    <div class="hist-list"></div>
  </div>
</div>

<script src="js/app.js"></script>
<script>
// ── PIN auth ──────────────────────────────────────────────────────────────────
// SHA-256 hash of the PIN. Change PIN by running:
//   crypto.subtle.digest('SHA-256', new TextEncoder().encode('yourpin'))
//     .then(b => [...new Uint8Array(b)].map(x=>x.toString(16).padStart(2,'0')).join(''))
// Default PIN: 1234
var PIN_HASH = "03ac674216f3e15c761ee1a5e255f067953623c8b388b4459e13f978d7c846f4";
var SESSION_KEY = "trainsr_auth";

function sha256(str) {
  var buf = new TextEncoder().encode(str);
  return crypto.subtle.digest('SHA-256', buf).then(function(hash) {
    return Array.from(new Uint8Array(hash)).map(function(b) {
      return b.toString(16).padStart(2, '0');
    }).join('');
  });
}

function checkPin() {
  var val = document.getElementById("pinInput").value;
  sha256(val).then(function(hash) {
    if (hash === PIN_HASH) {
      sessionStorage.setItem(SESSION_KEY, "1");
      document.getElementById("authOverlay").style.display = "none";
    } else {
      var inp = document.getElementById("pinInput");
      inp.value = "";
      inp.classList.add("error");
      setTimeout(function() { inp.classList.remove("error"); }, 400);
    }
  });
}

document.getElementById("pinInput").addEventListener("keydown", function(e) {
  if (e.key === "Enter") checkPin();
});

// Check session on load
if (sessionStorage.getItem(SESSION_KEY) !== "1") {
  document.getElementById("authOverlay").style.display = "flex";
} else {
  document.getElementById("authOverlay").style.display = "none";
}
</script>
</body>
</html>
